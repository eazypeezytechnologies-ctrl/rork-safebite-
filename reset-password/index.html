
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SafeBite - Verified</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="font-family: system-ui; padding: 24px;">
    <h2>SafeBite</h2>
    <p>Email verified. Tap below to return to the app.</p>

    <button id="open" style="padding:12px 16px; font-size:16px;">Open SafeBite</button>
    <p id="debug" style="margin-top:12px; font-size:12px; opacity:.7;"></p>

    <script>
      // ✅ TEMP: Works even before a domain. Replace later if needed.
      // For Rork/Expo preview, we’ll set this after you grab the preview URL.
      const APP_LINK_BASE = "https://dbnun3f649rb9vke6dzgv.rork.app/";

      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      const deepLink = code
        ? `${APP_LINK_BASE}auth/callback?code=${encodeURIComponent(code)}`
        : `${APP_LINK_BASE}signin`;

      document.getElementById("debug").textContent = deepLink;

      document.getElementById("open").onclick = () => {
        window.location.href = deepLink;
      };

      setTimeout(() => { window.location.href = deepLink; }, 700);
    </script>
  </body>
</html>
